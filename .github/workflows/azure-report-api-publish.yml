name: Azure 棚卸しレポート - API 3/3 公開

on:
  workflow_run:
    workflows:
      - Azure 棚卸しレポート - API 2/3 分析
    types:
      - completed
    branches:
      - main

concurrency:
  group: github-pages
  cancel-in-progress: false

permissions:
  contents: write
  actions: read

jobs:
  publish-report:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync repository before publishing
        shell: bash
        run: |
          git fetch origin main
          git checkout -B main origin/main

      - name: Download validated report artifacts
        uses: actions/download-artifact@v4
        with:
          name: azure-inventory-report-validated
          path: output/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Add repository link
        shell: pwsh
        env:
          REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          ./scripts/Add-RepositoryLinkToHtml.ps1 `
            -HtmlPath 'output/comprehensive-report.html' `
            -RepositoryUrl $env:REPOSITORY_URL

      - name: Prepare report outputs for repository and Pages
        shell: pwsh
        run: |
          $runDate = Get-Date -Format 'yyyy-MM-dd'
          $historyDir = Join-Path 'reports/history' $runDate
          $latestDir = 'reports/latest'
          $pagesDir = '_site'

          New-Item -ItemType Directory -Path $historyDir -Force | Out-Null
          New-Item -ItemType Directory -Path $latestDir -Force | Out-Null
          New-Item -ItemType Directory -Path $pagesDir -Force | Out-Null

          Copy-Item -Path output/* -Destination $historyDir -Recurse -Force
          Copy-Item -Path output/* -Destination $latestDir -Recurse -Force
          Copy-Item -Path output/* -Destination $pagesDir -Recurse -Force

          Copy-Item -Path output/comprehensive-report.html -Destination (Join-Path $latestDir 'index.html') -Force
          Copy-Item -Path output/comprehensive-report.html -Destination (Join-Path $pagesDir 'index.html') -Force
          '' | Set-Content -Path (Join-Path $pagesDir '.nojekyll') -Encoding utf8

      - name: Commit report snapshot to repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit"
            exit 0
          fi
          git commit -m "Publish API Azure inventory report [skip ci]"

          for attempt in 1 2 3; do
            if git pull --rebase --autostash -X theirs origin main && git push; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            git rebase --abort || true
            echo "Push attempt ${attempt} failed; retrying..."
            sleep 5
          done

          echo "Push failed after retries"
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site/

  deploy-pages:
    if: ${{ github.event.workflow_run.conclusion == 'success' && vars.ENABLE_GITHUB_PAGES == 'true' }}
    needs: publish-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
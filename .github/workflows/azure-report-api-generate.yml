name: Azure 棚卸しレポート - API 2/3 分析

on:
  workflow_run:
    workflows:
      - Azure 棚卸しレポート - API 1/3 収集
    types:
      - completed
    branches:
      - main

concurrency:
  group: azure-report-api-analysis
  cancel-in-progress: false

permissions:
  contents: read
  actions: read
  models: read

jobs:
  generate-and-validate:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download collected datasets
        uses: actions/download-artifact@v4
        with:
          name: azure-inventory-datasets
          path: output/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Read workflow metadata
        shell: pwsh
        run: |
          $metadataPath = 'output/workflow-metadata.json'
          if (-not (Test-Path -LiteralPath $metadataPath)) {
            throw "Workflow metadata not found: $metadataPath"
          }
          $metadata = Get-Content -LiteralPath $metadataPath -Raw -Encoding UTF8 | ConvertFrom-Json
          $reportMode = [string]$metadata.report_mode
          if ([string]::IsNullOrWhiteSpace($reportMode)) {
            $reportMode = 'auto'
          }
          "REPORT_MODE=$reportMode" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SOURCE_RUN_ID=$($metadata.source_workflow_run_id)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SOURCE_RUN_URL=$($metadata.source_workflow_run_url)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "SOURCE_HEAD_SHA=$($metadata.source_head_sha)" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build comprehensive HTML report with AI API
        shell: pwsh
        env:
          AI_REPORT_API_KEY: ${{ secrets.AI_REPORT_API_KEY }}
          AI_REPORT_API_ENDPOINT: ${{ vars.AI_REPORT_API_ENDPOINT }}
          AI_REPORT_MODEL: ${{ vars.AI_REPORT_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if ($env:REPORT_MODE -eq 'rule-based') {
            ./scripts/New-AzComprehensiveAdminReport.ps1
            exit 0
          }

          if ($env:REPORT_MODE -eq 'ai-only') {
            ./scripts/New-AzComprehensiveAdminReportWithAi.ps1 -FailOnError
            exit 0
          }

          ./scripts/New-AzComprehensiveAdminReportWithAi.ps1

      - name: Assert AI evidence for ai-only mode
        if: ${{ env.REPORT_MODE == 'ai-only' }}
        shell: pwsh
        run: |
          if (-not (Test-Path 'output/report-evidence.json')) {
            throw 'ai-only mode requires output/report-evidence.json, but it was not generated.'
          }

      - name: Validate generated report
        shell: pwsh
        run: |
          ./scripts/Test-AzComprehensiveAdminReport.ps1

      - name: Add source workflow evidence
        shell: pwsh
        env:
          SOURCE_RUN_ID: ${{ env.SOURCE_RUN_ID }}
          SOURCE_RUN_URL: ${{ env.SOURCE_RUN_URL }}
          SOURCE_HEAD_SHA: ${{ env.SOURCE_HEAD_SHA }}
          ANALYSIS_RUN_ID: ${{ github.run_id }}
          ANALYSIS_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          $evidencePath = 'output/report-evidence.json'
          if (Test-Path -LiteralPath $evidencePath) {
            $evidence = Get-Content -LiteralPath $evidencePath -Raw -Encoding UTF8 | ConvertFrom-Json
          }
          else {
            $evidence = [pscustomobject]@{
              generation_method = 'rule-based'
              generatedAt = (Get-Date).ToString('o')
            }
          }
          $evidence | Add-Member -NotePropertyName sourceRunId -NotePropertyValue $env:SOURCE_RUN_ID -Force
          $evidence | Add-Member -NotePropertyName sourceRunUrl -NotePropertyValue $env:SOURCE_RUN_URL -Force
          $evidence | Add-Member -NotePropertyName sourceHeadSha -NotePropertyValue $env:SOURCE_HEAD_SHA -Force
          $evidence | Add-Member -NotePropertyName analysisRunId -NotePropertyValue $env:ANALYSIS_RUN_ID -Force
          $evidence | Add-Member -NotePropertyName analysisRunUrl -NotePropertyValue $env:ANALYSIS_RUN_URL -Force
          $evidence | ConvertTo-Json -Depth 10 | Set-Content -LiteralPath $evidencePath -Encoding utf8

      - name: Upload validated report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azure-inventory-report-validated
          path: output/
          if-no-files-found: error
          retention-days: 7

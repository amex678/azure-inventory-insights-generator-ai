name: Azure 棚卸しレポート - API 1/3 収集

on:
  workflow_dispatch:
    inputs:
      report_mode:
        description: "Report generation mode"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - ai-only
          - rule-based
  schedule:
    # Production schedule: every 4 hours at minute 7 (UTC).
    - cron: '7 */4 * * *'

concurrency:
  group: azure-report-api-collection-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  collect-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Install Az PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Az -Scope CurrentUser -Repository PSGallery -Force
          Install-Module -Name Az.Advisor -Scope CurrentUser -Repository PSGallery -Force

      - name: Generate Azure inventory datasets
        shell: pwsh
        run: |
          ./scripts/Export-AzResources.ps1
          ./scripts/Export-AzRoleAssignments.ps1
          ./scripts/Export-AzNsgRules.ps1
          ./scripts/Export-AzDefenderRecommendations.ps1
          ./scripts/Export-AzAdvisorRecommendations.ps1

      - name: Record report mode
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path output -Force | Out-Null
          $reportMode = '${{ github.event.inputs.report_mode }}'
          if ([string]::IsNullOrWhiteSpace($reportMode)) {
            $reportMode = 'auto'
          }
          $metadata = [ordered]@{
            report_mode = $reportMode
            source_workflow_run_id = '${{ github.run_id }}'
            source_workflow_run_url = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            source_head_sha = '${{ github.sha }}'
            collected_at = (Get-Date).ToString('o')
          }
          $metadata | ConvertTo-Json -Depth 5 | Set-Content -Path output/workflow-metadata.json -Encoding utf8

      - name: Upload collected datasets
        uses: actions/upload-artifact@v4
        with:
          name: azure-inventory-datasets
          path: output/
          if-no-files-found: error
          retention-days: 3

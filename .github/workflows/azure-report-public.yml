name: Azure Inventory Report - Public OIDC

on:
  workflow_dispatch:
    inputs:
      report_mode:
        description: "Report generation mode"
        required: true
        default: auto
        type: choice
        options:
          - auto
          - ai-only
          - rule-based
  schedule:
    # Production schedule: every 4 hours at minute 7 (UTC).
    - cron: '7 */4 * * *'

concurrency:
  group: azure-report-public-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: write
  pages: write
  models: read

jobs:
  collect-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login with OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          enable-AzPSSession: true

      - name: Install Az PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module -Name Az -Scope CurrentUser -Repository PSGallery -Force
          Install-Module -Name Az.Advisor -Scope CurrentUser -Repository PSGallery -Force

      - name: Generate Azure inventory datasets
        shell: pwsh
        run: |
          ./scripts/Export-AzResources.ps1
          ./scripts/Export-AzRoleAssignments.ps1
          ./scripts/Export-AzNsgRules.ps1
          ./scripts/Export-AzDefenderRecommendations.ps1
          ./scripts/Export-AzAdvisorRecommendations.ps1

      - name: Upload collected datasets
        uses: actions/upload-artifact@v4
        with:
          name: azure-inventory-datasets
          path: output/
          if-no-files-found: error
          retention-days: 30

  agent-generate-report:
    needs: collect-data
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download collected datasets
        uses: actions/download-artifact@v4
        with:
          name: azure-inventory-datasets
          path: output/

      - name: Build comprehensive HTML report with Agent
        shell: pwsh
        env:
          AI_REPORT_API_KEY: ${{ secrets.AI_REPORT_API_KEY }}
          AI_REPORT_API_ENDPOINT: ${{ vars.AI_REPORT_API_ENDPOINT }}
          AI_REPORT_MODEL: ${{ vars.AI_REPORT_MODEL }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_MODE: ${{ github.event.inputs.report_mode || 'auto' }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          if ($env:REPORT_MODE -eq 'rule-based') {
            ./scripts/New-AzComprehensiveAdminReport.ps1
            exit 0
          }

          if ($env:REPORT_MODE -eq 'ai-only') {
            ./scripts/New-AzComprehensiveAdminReportWithAgent.ps1 -FailOnError
            exit 0
          }

          ./scripts/New-AzComprehensiveAdminReportWithAgent.ps1

      - name: Assert AI evidence for ai-only mode
        if: ${{ github.event.inputs.report_mode == 'ai-only' }}
        shell: pwsh
        run: |
          if (-not (Test-Path 'output/report-evidence.json')) {
            throw 'ai-only mode requires output/report-evidence.json, but it was not generated.'
          }

      - name: Upload generated report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azure-inventory-report
          path: output/
          if-no-files-found: error
          retention-days: 30

  validate-report:
    needs: agent-generate-report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download generated report artifacts
        uses: actions/download-artifact@v4
        with:
          name: azure-inventory-report
          path: output/

      - name: Validate generated report
        shell: pwsh
        run: |
          ./scripts/Test-AzComprehensiveAdminReport.ps1

      - name: Upload validated report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: azure-inventory-report-validated
          path: output/
          if-no-files-found: error
          retention-days: 30

  publish-report:
    needs: validate-report
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download validated report artifacts
        uses: actions/download-artifact@v4
        with:
          name: azure-inventory-report-validated
          path: output/

      - name: Prepare report outputs for repository and Pages
        shell: pwsh
        run: |
          $runDate = Get-Date -Format 'yyyy-MM-dd'
          $historyDir = Join-Path 'reports/history' $runDate
          $latestDir = 'reports/latest'
          $pagesDir = '_site'

          New-Item -ItemType Directory -Path $historyDir -Force | Out-Null
          New-Item -ItemType Directory -Path $latestDir -Force | Out-Null
          New-Item -ItemType Directory -Path $pagesDir -Force | Out-Null

          Copy-Item -Path output/* -Destination $historyDir -Recurse -Force
          Copy-Item -Path output/* -Destination $latestDir -Recurse -Force
          Copy-Item -Path output/* -Destination $pagesDir -Recurse -Force

          Copy-Item -Path output/comprehensive-report.html -Destination (Join-Path $latestDir 'index.html') -Force
          Copy-Item -Path output/comprehensive-report.html -Destination (Join-Path $pagesDir 'index.html') -Force
          '' | Set-Content -Path (Join-Path $pagesDir '.nojekyll') -Encoding utf8

      - name: Commit report snapshot to repository
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f reports/
          if git diff --cached --quiet; then
            echo "No report changes to commit"
            exit 0
          fi
          git commit -m "Publish Azure inventory report [skip ci]"

          # Retry push with rebase to absorb concurrent report commits.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin main && git push; then
              echo "Push succeeded on attempt ${attempt}"
              exit 0
            fi
            git rebase --abort || true
            echo "Push attempt ${attempt} failed; retrying..."
            sleep 5
          done

          echo "Push failed after retries"
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

  deploy-pages:
    if: ${{ vars.ENABLE_GITHUB_PAGES == 'true' }}
    needs: publish-report
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
